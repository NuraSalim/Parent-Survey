<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kinderwald Parent Survey</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background: #f6f2e9;
      margin: 0;
      padding: 0;
      color: #4a4a4a;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #5b7c4d;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 30px;
    }

    .section {
      margin-bottom: 40px;
    }

    .section h2 {
      color: #7b5e3b;
      border-bottom: 2px solid #e8dcc5;
      padding-bottom: 10px;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 18px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    .rating {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }

    .rating label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    button {
      background: #5b7c4d;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      display: block;
      margin: auto;
      transition: 0.3s;
    }

    button:hover {
      background: #48653d;
    }

    .thankyou {
      display: none;
      text-align: center;
      margin-top: 30px;
      color: #5b7c4d;
      font-size: 20px;
      font-weight: bold;
    }

    .arabic {
      direction: rtl;
      text-align: right;
      background: #faf7f1;
      padding: 20px;
      border-radius: 15px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Kinderwald Kindergarten</h1>
  <p class="subtitle">
    Parent Feedback Survey | استبيان أولياء الأمور
  </p>

  <form id="surveyForm">

    <!-- ENGLISH -->

    <div class="section english">

      <h2>English Survey</h2>

      <label>Parent Name (Optional)</label>
      <input type="text" name="parentName" placeholder="Enter your name">

      <label>Child Name (Optional)</label>
      <input type="text" name="childName" placeholder="Enter your child's name">

      <label>Select Class *</label>
      <select name="className" required>
        <option value="">Choose a class</option>
        <option>Squirrels</option>
        <option>Pandas</option>
        <option>Koalas</option>
        <option>Bunnies</option>
      </select>

      <label>How satisfied are you with your child’s experience at Kinderwald?</label>

      <div class="rating">
        <label><input type="radio" name="satisfaction" value="Excellent"> Excellent</label>
        <label><input type="radio" name="satisfaction" value="Good"> Good</label>
        <label><input type="radio" name="satisfaction" value="Average"> Average</label>
        <label><input type="radio" name="satisfaction" value="Needs Improvement"> Needs Improvement</label>
      </div>

      <textarea
        name="needsImprovement"
        placeholder="If you chose Needs Improvement, please tell us more 💛"></textarea>

      <label>What do you like most? 💛</label>

      <textarea
        name="likeMost"
        placeholder="Write your feedback"></textarea>

      <label>Do you feel your child is learning and developing well?</label>

      <select name="learningProgress">
        <option>Yes</option>
        <option>Sometimes</option>
        <option>No</option>
      </select>

      <label>What can we improve? ✨</label>

      <textarea
        name="improve"
        placeholder="Share your thoughts"></textarea>

      <label>Would you be interested in adding a second language? 🇩🇪🇫🇷</label>

      <div class="rating">
        <label><input type="radio" name="secondLanguage" value="German"> German</label>
        <label><input type="radio" name="secondLanguage" value="French"> French</label>
        <label><input type="radio" name="secondLanguage" value="No"> No</label>
      </div>

      <label>How satisfied are you with communication through the Bloomz app?</label>

      <div class="rating">
        <label><input type="radio" name="bloomz" value="Excellent"> Excellent</label>
        <label><input type="radio" name="bloomz" value="Good"> Good</label>
        <label><input type="radio" name="bloomz" value="Average"> Average</label>
        <label><input type="radio" name="bloomz" value="Needs Improvement"> Needs Improvement</label>
      </div>

      <textarea
        name="bloomzNotes"
        placeholder="If you chose Needs Improvement, please share your thoughts ✨"></textarea>

    </div>

    <!-- ARABIC -->

    <div class="section arabic">

      <h2>الاستبيان باللغة العربية</h2>

      <label>اسم ولي الأمر (اختياري)</label>
      <input type="text" name="arabicParentName" placeholder="اكتب الاسم">

      <label>اسم الطفل (اختياري)</label>
      <input type="text" name="arabicChildName" placeholder="اكتب اسم الطفل">

      <label>اختيار الفصل *</label>

      <select name="arabicClassName" required>
        <option value="">اختر الفصل</option>
        <option>Squirrels</option>
        <option>Pandas</option>
        <option>Koalas</option>
        <option>Bunnies</option>
      </select>

      <label>ما مدى رضاكم عن تجربة طفلكم في الحضانة؟</label>

      <div class="rating">
        <label><input type="radio" name="arabicSatisfaction" value="ممتاز"> ممتاز</label>
        <label><input type="radio" name="arabicSatisfaction" value="جيد"> جيد</label>
        <label><input type="radio" name="arabicSatisfaction" value="متوسط"> متوسط</label>
        <label><input type="radio" name="arabicSatisfaction" value="يحتاج تحسين"> يحتاج تحسين</label>
      </div>

      <textarea
        name="arabicNeedsImprovement"
        placeholder="إذا اخترت يحتاج تحسين، شاركنا رأيك 💛"></textarea>

      <label>ما أكثر شيء يعجبكم؟ 💛</label>

      <textarea
        name="arabicLikeMost"
        placeholder="اكتب رأيك"></textarea>

      <label>هل تشعر أن طفلك يتعلم ويتطور بشكل جيد؟</label>

      <select name="arabicLearningProgress">
        <option>نعم</option>
        <option>إلى حد ما</option>
        <option>لا</option>
      </select>

      <label>ما الذي يمكننا تحسينه؟ ✨</label>

      <textarea
        name="arabicImprove"
        placeholder="شاركنا رأيك"></textarea>

      <label>هل تهتمون بإضافة لغة ثانية؟ 🇩🇪🇫🇷</label>

      <div class="rating">
        <label><input type="radio" name="arabicSecondLanguage" value="الألمانية"> الألمانية</label>
        <label><input type="radio" name="arabicSecondLanguage" value="الفرنسية"> الفرنسية</label>
        <label><input type="radio" name="arabicSecondLanguage" value="لا"> لا</label>
      </div>

      <label>ما مدى رضاكم عن التواصل من خلال تطبيق Bloomz؟</label>

      <div class="rating">
        <label><input type="radio" name="arabicBloomz" value="ممتاز"> ممتاز</label>
        <label><input type="radio" name="arabicBloomz" value="جيد"> جيد</label>
        <label><input type="radio" name="arabicBloomz" value="متوسط"> متوسط</label>
        <label><input type="radio" name="arabicBloomz" value="يحتاج تحسين"> يحتاج تحسين</label>
      </div>

      <textarea
        name="arabicBloomzNotes"
        placeholder="إذا اخترت يحتاج تحسين، أخبرنا بما يمكن تطويره ✨"></textarea>

    </div>

    <button type="submit">
      Submit | إرسال
    </button>

    <div class="thankyou" id="thankyouMessage">
      Thank you for your feedback 💛<br>
      شكرًا لمشاركتكم رأيكم 💛
    </div>

  </form>

</div>

<script>

const form = document.getElementById('surveyForm');

form.addEventListener('submit', async function(e) {

  e.preventDefault();

  const formData = new FormData(form);

  const data = Object.fromEntries(formData.entries());

  await fetch("https://script.google.com/macros/s/AKfycbz8DKitayQzFcovM_urCC_tTnROJbCLdyU5J36gUJqeguFt7j-J-rkjX8Y7dlAHgCLI/exec", {

    method: "POST",

    body: JSON.stringify(data)

  });

  document.getElementById('thankyouMessage').style.display = 'block';

  form.reset();

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: 'smooth'
  });

});

</script>

</body>
</html>
